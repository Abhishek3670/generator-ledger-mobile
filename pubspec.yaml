name: genset_ledger_mobile
description: A mobile application for the Generator Ledger system.
publish_to: 'none'
version: 0.4.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.3.3 # For API calls to your FastAPI backend
  provider: ^6.1.1 # For state management
  google_fonts: ^6.1.0 # To match your web app's typography
  flutter_secure_storage: ^9.0.0
  go_router: ^12.1.3
  intl: ^0.19.0
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
